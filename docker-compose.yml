services:
  postgres:
    image: postgres:16
    container_name: emploi_maroc_postgres
    environment:
      POSTGRES_USER: emploi
      POSTGRES_PASSWORD: emploi
      POSTGRES_DB: emploi_maroc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  airflow-postgres:
    image: postgres:16
    container_name: laborlens_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: laborlens_kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: laborlens_schema_registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: emploi_maroc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    image: laborlens-superset:4.1.1
    container_name: emploi_maroc_superset
    environment:
      SUPERSET_SECRET_KEY: change-me-in-production
    ports:
      - "8089:8088"
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      - postgres

  airflow-init:
    image: apache/airflow:2.10.4-python3.11
    container_name: laborlens_airflow_init
    depends_on:
      - airflow-postgres
      - postgres
      - minio
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: -r /opt/airflow/project/requirements.txt
      DATABASE_URL: postgresql+psycopg2://emploi:emploi@postgres:5432/emploi_maroc
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: laborlens
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    working_dir: /opt/airflow/project
    command: version

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.11
    container_name: laborlens_airflow_webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: -r /opt/airflow/project/requirements.txt
      DATABASE_URL: postgresql+psycopg2://emploi:emploi@postgres:5432/emploi_maroc
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: laborlens
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    working_dir: /opt/airflow/project
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.11
    container_name: laborlens_airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: -r /opt/airflow/project/requirements.txt
      DATABASE_URL: postgresql+psycopg2://emploi:emploi@postgres:5432/emploi_maroc
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: laborlens
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    working_dir: /opt/airflow/project
    command: scheduler

volumes:
  postgres_data:
  airflow_postgres_data:
  minio_data:
  superset_home:
  airflow_logs:
