services:
  postgres:
    image: postgres:16
    container_name: emploi_maroc_postgres
    environment:
      POSTGRES_USER: emploi
      POSTGRES_PASSWORD: emploi
      POSTGRES_DB: emploi_maroc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: emploi_maroc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    image: laborlens-superset:4.1.1
    container_name: emploi_maroc_superset
    environment:
      SUPERSET_SECRET_KEY: change-me-in-production
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
  superset_home:
